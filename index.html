<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Nexus - Online P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: #161622;
            --accent-cyan: #00f0ff;
            --accent-pink: #ff0055;
            --accent-green: #00ff66;
            --accent-yellow: #ffd700;
            --text-main: #ffffff;
            --text-muted: #888899;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        #history-sidebar {
            width: 350px;
            background-color: var(--bg-panel);
            border-right: 2px solid var(--accent-cyan);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 5px 0 20px rgba(0, 240, 255, 0.15);
            z-index: 10;
        }

        #history-sidebar h2 {
            color: var(--accent-cyan);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        #history-log {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-entry {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            animation: slideInLeft 0.3s ease-out forwards;
            border-left: 4px solid var(--accent-cyan);
        }
        .log-elimination { border-left-color: var(--accent-pink); font-weight: bold; }
        .log-point { border-left-color: var(--accent-green); }

        #main-content {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            background: var(--bg-panel);
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            text-align: center;
            max-width: 800px;
            width: 100%;
            animation: fadeIn 0.4s ease;
        }

        .screen.active { display: flex; }

        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        h2 { font-size: 2.5rem; margin-bottom: 20px; }
        h3 { font-size: 2rem; margin-bottom: 20px; color: var(--accent-yellow); }
        p { margin-bottom: 30px; font-size: 1.2rem; color: var(--text-muted); line-height: 1.6; }

        .input-group { width: 100%; margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--accent-cyan); font-weight: bold; text-transform: uppercase; }

        input, select {
            width: 100%;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border: 2px solid #333;
            color: white;
            font-size: 1.5rem;
            border-radius: 12px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }

        .btn-row { display: flex; gap: 20px; width: 100%; margin-top: 20px; }

        button {
            flex: 1;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            color: white;
            background: linear-gradient(45deg, #0044cc, var(--accent-cyan));
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 240, 255, 0.4); }
        button:disabled { background: #333; color: #777; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-alt { background: linear-gradient(45deg, #cc00ff, var(--accent-pink)); }
        .btn-danger { background: linear-gradient(45deg, #ff0000, #cc0000); }

        #big-feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 7rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            text-shadow: 0 0 30px rgba(0,0,0,1);
            width: 100%;
        }

        .animate-big-fade { animation: bigFadeOut 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }

        #lobby-players { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .player-badge { background: rgba(0, 240, 255, 0.1); border: 1px solid var(--accent-cyan); padding: 10px 20px; border-radius: 30px; font-size: 1.2rem; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bigFadeOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }
    </style>
</head>
<body>

    <aside id="history-sidebar">
        <h2>Network Log</h2>
        <div id="history-log">
            <div class="log-entry" style="color: var(--text-muted)">Not connected...</div>
        </div>
    </aside>

    <main id="main-content">
        <div id="big-feedback"></div>

        <div id="screen-menu" class="screen active">
            <h1>Number Nexus</h1>
            <p>Online Multiplayer Survival</p>
            <div class="btn-row">
                <button onclick="showScreen('host')">Create Room</button>
                <button class="btn-alt" onclick="showScreen('join')">Join Room</button>
            </div>
        </div>

        <div id="screen-host" class="screen">
            <h2>Host Settings</h2>
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="host-name" placeholder="Enter your alias">
            </div>
            <div class="input-group">
                <label>Game Mode</label>
                <select id="host-mode">
                    <option value="2">2-Player Showdown</option>
                    <option value="multi">Multiplayer Chaos</option>
                </select>
            </div>
            <div class="btn-row">
                <button class="btn-danger" onclick="showScreen('menu')">Back</button>
                <button onclick="createRoom()">Generate Room</button>
            </div>
        </div>

        <div id="screen-join" class="screen">
            <h2>Join a Room</h2>
            <div class="input-group">
                <label>Room Code</label>
                <input type="text" id="join-code" placeholder="e.g. ABCD" maxlength="4" style="text-transform: uppercase;">
            </div>
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" id="join-name" placeholder="Enter your alias">
            </div>
            <div class="btn-row">
                <button class="btn-danger" onclick="showScreen('menu')">Back</button>
                <button onclick="joinRoom()">Connect</button>
            </div>
        </div>

        <div id="screen-lobby" class="screen">
            <h2>Room Code: <span id="display-room-code" style="color: var(--accent-pink); letter-spacing: 5px;">----</span></h2>
            <p id="lobby-mode-text"></p>
            <div id="lobby-players"></div>
            <button id="btn-start-game" disabled onclick="hostStartGame()">Waiting for players...</button>
        </div>

        <div id="screen-game" class="screen">
            <h3 id="turn-status">Game Started!</h3>
            
            <div id="active-play-area" style="display: none; width: 100%;">
                <p>Guess a number (1 - 100).</p>
                <input type="number" id="guess-input" placeholder="Make your guess...">
                <button onclick="sendGuess()">Submit Guess</button>
            </div>

            <div id="waiting-area" style="display: none; width: 100%;">
                <p style="font-size: 1.5rem; color: var(--accent-cyan);">Waiting for the active player to guess...</p>
            </div>
        </div>
    </main>

    <script>
        // --- Game & Network State ---
        let localPlayer = { id: generateId(), name: '', isHost: false };
        let gameState = { roomId: null, mode: '2', players: [], activeTurnId: null, status: 'lobby' };
        
        // PeerJS Variables
        let peer = null;
        let connections = []; // Host uses this to talk to guests
        let hostConnection = null; // Guests use this to talk to host

        // --- Utils ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${screenId}`).classList.add('active');
        }
        function generateId() { return Math.random().toString(36).substr(2, 9); }
        function generateRoomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let result = '';
            for (let i = 0; i < 4; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        }
        function logEvent(msg, type = 'normal') {
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.innerHTML = msg;
            document.getElementById('history-log').prepend(div);
        }
        function triggerBigFade(text, color) {
            const bf = document.getElementById('big-feedback');
            bf.innerText = text; bf.style.color = color;
            bf.classList.remove('animate-big-fade'); void bf.offsetWidth; bf.classList.add('animate-big-fade');
        }

        // ==========================================
        // HOST LOGIC (Acts as the Server)
        // ==========================================
        function createRoom() {
            localPlayer.name = document.getElementById('host-name').value || 'Host';
            localPlayer.isHost = true;
            gameState.mode = document.getElementById('host-mode').value;
            gameState.roomId = generateRoomCode();
            
            gameState.players.push({ id: localPlayer.id, name: localPlayer.name });

            // Initialize PeerJS using the Room Code as the unique ID
            logEvent("Connecting to server broker...");
            peer = new Peer('nexus-' + gameState.roomId);

            peer.on('open', (id) => {
                logEvent(`Room Created. Waiting for connections...`);
                updateLobbyUI();
                showScreen('lobby');
            });

            // When a guest connects to the host
            peer.on('connection', (conn) => {
                connections.push(conn);
                
                // Listen for messages from the guest
                conn.on('data', (data) => {
                    if (data.type === 'JOIN') {
                        gameState.players.push({ id: data.id, name: data.name });
                        logEvent(`${data.name} joined the room!`, 'log-point');
                        broadcastState(); // Tell everyone the new player list
                    }
                    if (data.type === 'GUESS') {
                        handleGuessData(data.playerId, data.value);
                    }
                });
            });
        }

        function broadcastState() {
            if (!localPlayer.isHost) return;
            updateLobbyUI();
            connections.forEach(conn => conn.send({ type: 'STATE_UPDATE', state: gameState }));
        }

        // ==========================================
        // GUEST LOGIC (Connects to the Host)
        // ==========================================
        function joinRoom() {
            localPlayer.name = document.getElementById('join-name').value || 'Guest';
            localPlayer.isHost = false;
            let code = document.getElementById('join-code').value.toUpperCase();
            
            logEvent("Finding room...");
            peer = new Peer(); // Guest gets a random ID

            peer.on('open', () => {
                // Connect to the Host's Room Code ID
                hostConnection = peer.connect('nexus-' + code);

                hostConnection.on('open', () => {
                    logEvent("Connected to Host!");
                    hostConnection.send({ type: 'JOIN', id: localPlayer.id, name: localPlayer.name });
                    showScreen('lobby');
                });

                // Listen for updates from Host
                hostConnection.on('data', (data) => {
                    if (data.type === 'STATE_UPDATE') {
                        gameState = data.state;
                        updateLobbyUI();
                        if (gameState.status === 'playing' && document.getElementById('screen-lobby').classList.contains('active')) {
                            showScreen('game');
                        }
                        updateGameUI();
                    }
                    if (data.type === 'FEEDBACK') {
                        triggerBigFade(data.text, data.color);
                        logEvent(data.logMsg);
                    }
                });
            });
        }

        // ==========================================
        // UI & GAME UPDATES
        // ==========================================
        function updateLobbyUI() {
            document.getElementById('display-room-code').innerText = gameState.roomId || "----";
            document.getElementById('lobby-mode-text').innerText = gameState.mode === '2' ? "2-Player Mode" : "Multiplayer Mode";
            
            const container = document.getElementById('lobby-players');
            container.innerHTML = '';
            gameState.players.forEach(p => {
                container.innerHTML += `<div class="player-badge">${p.name}</div>`;
            });

            if (localPlayer.isHost) {
                const btn = document.getElementById('btn-start-game');
                const req = gameState.mode === '2' ? 2 : 3;
                if (gameState.players.length >= req) {
                    btn.disabled = false;
                    btn.innerText = "Start Game";
                }
            }
        }

        function hostStartGame() {
            if (!localPlayer.isHost) return;
            gameState.status = 'playing';
            gameState.activeTurnId = gameState.players[0].id; // Host starts
            broadcastState();
            showScreen('game');
            updateGameUI();
        }

        function updateGameUI() {
            if (gameState.status !== 'playing') return;
            let isMyTurn = (gameState.activeTurnId === localPlayer.id);
            let activePlayer = gameState.players.find(p => p.id === gameState.activeTurnId);

            document.getElementById('turn-status').innerText = isMyTurn ? "IT IS YOUR TURN!" : `Waiting for ${activePlayer.name}...`;
            document.getElementById('turn-status').style.color = isMyTurn ? "var(--accent-green)" : "var(--text-muted)";
            
            document.getElementById('active-play-area').style.display = isMyTurn ? "block" : "none";
            document.getElementById('waiting-area').style.display = isMyTurn ? "none" : "block";
        }

        function sendGuess() {
            let guess = parseInt(document.getElementById('guess-input').value);
            if (isNaN(guess)) return;

            if (localPlayer.isHost) {
                handleGuessData(localPlayer.id, guess);
            } else {
                hostConnection.send({ type: 'GUESS', playerId: localPlayer.id, value: guess });
            }
            document.getElementById('guess-input').value = '';
        }

        // Host calculates the game logic and sends feedback
        function handleGuessData(playerId, guessValue) {
            let guesser = gameState.players.find(p => p.id === playerId);
            
            // Randomize a High/Low response for testing gameplay loop
            let resultType = Math.random() > 0.5 ? "TOO HIGH!" : "TOO LOW!";
            let logMsg = `<strong>${guesser.name}</strong> guessed ${guessValue}. Result: ${resultType}`;
            
            // Show to Host
            triggerBigFade(resultType, 'var(--accent-cyan)');
            logEvent(logMsg);

            // Broadcast to Guests
            connections.forEach(conn => conn.send({ type: 'FEEDBACK', text: resultType, color: 'var(--accent-cyan)', logMsg: logMsg }));

            // Cycle turn
            let currentIndex = gameState.players.findIndex(p => p.id === gameState.activeTurnId);
            let nextIndex = (currentIndex + 1) % gameState.players.length;
            gameState.activeTurnId = gameState.players[nextIndex].id;
            
            setTimeout(() => broadcastState(), 1000);
            updateGameUI();
        }
    </script>
</body>
</html>
